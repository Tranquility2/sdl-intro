name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # One shared, cacheable location for FetchContent downloads.
  DEPS_KEY: sdl3-3.4.12-image-3.4.4-ttf-3.2.2

jobs:
  # Required native Release matrix: Linux (GCC) and Windows (MSVC). macOS runs
  # only through the separate, manually dispatched macos.yml workflow.
  native-release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu GCC (release)
            os: ubuntu-latest
            preset: release
          - name: Windows MSVC (release)
            os: windows-2022
            preset: windows-msvc-release
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxtst-dev libwayland-dev \
            libxkbcommon-dev wayland-protocols libegl1-mesa-dev \
            libgl1-mesa-dev libgles2-mesa-dev libpulse-dev libasound2-dev

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ env.DEPS_KEY }}

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ runner.os }}-${{ matrix.preset }}
          path: build/**/Testing/**
          if-no-files-found: ignore

  # Required Linux-to-Windows MinGW-w64 cross-build. Proves the pinned static
  # SDL stack cross-compiles to a self-contained Windows x86_64 executable. The
  # produced .exe cannot run on the Linux runner, so there is no CTest step;
  # instead we assert the binary format and that runtime assets ship beside it.
  mingw-cross:
    name: Ubuntu MinGW-w64 cross (mingw-release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64 cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-mingw-${{ env.DEPS_KEY }}

      - name: Configure
        run: cmake --preset mingw-release -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps

      - name: Build
        run: cmake --build --preset mingw-release

      - name: Verify Windows executable and assets
        run: |
          exe=build/mingw-release/sdl_intro.exe
          test -f "$exe" || { echo "Missing $exe"; exit 1; }
          file "$exe"
          file "$exe" | grep -q 'PE32+ executable (GUI)' || {
            echo "Expected a PE32+ GUI (Windows x86_64) executable"; exit 1; }
          for asset in assets/sdl-logo.png assets/OpenSans-Regular.ttf; do
            test -f "build/mingw-release/$asset" || {
              echo "Missing runtime asset: $asset"; exit 1; }
          done

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: sdl_intro-windows-x86_64
          path: |
            build/mingw-release/sdl_intro.exe
            build/mingw-release/assets
          if-no-files-found: error

  # Required Ubuntu Emscripten/WebAssembly build. Proves the pinned static SDL
  # stack compiles to WebAssembly and produces a runnable browser bundle. The
  # .html target is not directly executable, so instead of CTest we assert the
  # four bundle files exist and are non-empty, then upload them.
  emscripten-web:
    name: Ubuntu Emscripten (web-release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten SDK
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984  # v16
        with:
          version: 6.0.3

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: .deps-web
          key: deps-${{ runner.os }}-web-${{ env.DEPS_KEY }}

      - name: Configure
        run: cmake --preset web-release -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps-web

      - name: Build
        run: cmake --build --preset web-release

      - name: Verify WebAssembly bundle
        run: |
          dir=build/web-release
          for f in sdl_intro.html sdl_intro.js sdl_intro.wasm sdl_intro.data; do
            test -s "$dir/$f" || { echo "Missing or empty bundle file: $f"; exit 1; }
          done
          ls -l "$dir"/sdl_intro.{html,js,wasm,data}

      - name: Upload WebAssembly bundle
        uses: actions/upload-artifact@v4
        with:
          name: sdl_intro-web
          path: |
            build/web-release/sdl_intro.html
            build/web-release/sdl_intro.js
            build/web-release/sdl_intro.wasm
            build/web-release/sdl_intro.data
          if-no-files-found: error

  # Required Ubuntu AddressSanitizer/UndefinedBehaviorSanitizer job. Runs the
  # same smoke test with fail-fast sanitizer settings.
  ubuntu-asan-ubsan:
    name: Ubuntu ASan/UBSan (asan-ubsan)
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1:print_stacktrace=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxtst-dev libwayland-dev \
            libxkbcommon-dev wayland-protocols libegl1-mesa-dev \
            libgl1-mesa-dev libgles2-mesa-dev libpulse-dev libasound2-dev

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ env.DEPS_KEY }}

      - name: Configure
        run: cmake --preset asan-ubsan -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps

      - name: Build
        run: cmake --build --preset asan-ubsan

      - name: Test
        run: ctest --preset asan-ubsan --output-on-failure

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-asan-ubsan
          path: build/**/Testing/**
          if-no-files-found: ignore
