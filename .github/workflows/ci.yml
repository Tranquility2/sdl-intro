name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # One shared, cacheable location for FetchContent downloads.
  DEPS_KEY: sdl3-3.4.12-image-3.4.4-ttf-3.2.2

jobs:
  # Required native Release matrix: Linux (GCC), macOS (AppleClang), Windows
  # (MSVC). Proves the pinned static SDL stack builds and the smoke test passes
  # on each desktop platform.
  native-release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu GCC (release)
            os: ubuntu-latest
            preset: release
          - name: macOS AppleClang (release)
            os: macos-latest
            preset: release
          - name: Windows MSVC (release)
            os: windows-2022
            preset: windows-msvc-release
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxtst-dev libwayland-dev \
            libxkbcommon-dev wayland-protocols libegl1-mesa-dev \
            libgl1-mesa-dev libgles2-mesa-dev libpulse-dev libasound2-dev

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ env.DEPS_KEY }}

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ runner.os }}-${{ matrix.preset }}
          path: build/**/Testing/**
          if-no-files-found: ignore

  # Required Ubuntu AddressSanitizer/UndefinedBehaviorSanitizer job. Runs the
  # same smoke test with fail-fast sanitizer settings.
  ubuntu-asan-ubsan:
    name: Ubuntu ASan/UBSan (asan-ubsan)
    runs-on: ubuntu-latest
    env:
      ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1:print_stacktrace=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxtst-dev libwayland-dev \
            libxkbcommon-dev wayland-protocols libegl1-mesa-dev \
            libgl1-mesa-dev libgles2-mesa-dev libpulse-dev libasound2-dev

      - name: Cache fetched dependencies
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-${{ runner.os }}-${{ env.DEPS_KEY }}

      - name: Configure
        run: cmake --preset asan-ubsan -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps

      - name: Build
        run: cmake --build --preset asan-ubsan

      - name: Test
        run: ctest --preset asan-ubsan --output-on-failure

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-asan-ubsan
          path: build/**/Testing/**
          if-no-files-found: ignore
